# ==============================
# APP
# ==============================
spring.application.name=kpstore
server.port=8080

# ==============================
# MONGODB
# ==============================
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/kpstore}
spring.data.mongodb.database=${MONGODB_DB:kpstore}

# ==============================
# JWT (SEGURANĂ‡A)
# ==============================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ==============================
# LOG
# ==============================
logging.level.org.springframework=INFO