<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Backoffice | Produtos | KP Store</title>
  <link rel="stylesheet" href="../assets/css/admin-produtos.css" />
</head>
<body>
  <header class="topo">
    <div class="logo-area">
      <img src="../assets/imagens/logo.jpeg" alt="Logo KP Store" class="logo" />
      <h1>KP Store - Backoffice</h1>
    </div>

    <nav class="menu">
      <a href="index.html">Loja</a>
      <a href="admin-pedidos.html">Pedidos</a>
      <a href="admin-produtos.html">Produtos</a>

      <span id="admin-info"></span>
      <button id="botao-logout" class="botao-logout">Sair</button>
    </nav>
  </header>

  <main>
    <section class="cabecalho-admin">
      <div class="cabecalho-conteudo">
        <span class="tag-pagina">PAINEL ADMINISTRATIVO</span>
        <h2>Gerenciamento de produtos</h2>
        <p>Cadastre, visualize, edite e remova produtos da KP Store.</p>
      </div>
    </section>

    <section class="area-admin">
      <form id="form-produto" class="form-produto">
        <h3 id="titulo-formulario">Cadastrar produto</h3>

        <input type="text" id="nome" placeholder="Nome do produto" required />
        <input type="text" id="categoria" placeholder="Categoria" required />
        <input type="number" id="preco" placeholder="Preço" step="0.01" required />
        <input type="text" id="imagem" placeholder="Nome ou URL da imagem" />
        <textarea id="descricao" placeholder="Descrição do produto" rows="4" required></textarea>
        <input type="text" id="cores" placeholder="Cores (separadas por vírgula)" required />
        <input type="text" id="tamanhos" placeholder="Tamanhos (separados por vírgula)" required />

        <button type="submit" class="botao-salvar" id="botao-salvar">
          Cadastrar produto
        </button>

        <button
          type="button"
          class="botao-cancelar"
          id="botao-cancelar"
          style="display: none;"
        >
          Cancelar edição
        </button>
      </form>

      <section class="painel-produtos">
        <h3>Produtos cadastrados</h3>
        <div id="lista-produtos-admin" class="lista-produtos-admin"></div>
      </section>
    </section>
  </main>

  <footer class="rodape">
    <p>&copy; 2026 KP Store - Backoffice</p>
  </footer>

  <script src="../assets/js/admin-produtos.js"></script>
</body>
</html>
